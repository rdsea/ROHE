apiVersion: apps/v1
kind: Deployment
metadata:
  name: lstm-inference
  namespace: bts
  labels:
    app: lstm-inference
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lstm-inference
  template:
    metadata:
      labels:
        app: lstm-inference
    spec:
      containers:
        - name: lstm
          image: rohe/bts-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE
              value: lstm_inference
            - name: ROHE_SERVICE_NAME
              value: lstm
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lstm-inference
  namespace: bts
spec:
  selector:
    app: lstm-inference
  ports:
    - port: 8000
      targetPort: 8000
