apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-gateway
  labels:
    app: web-gateway
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-gateway
  template:
    metadata:
      labels:
        app: web-gateway
    spec:
      containers:
        - name: web-gateway
          image: rdsea/cctvs-web-gateway:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ROHE_SERVICE_NAME
              value: web-gateway
            - name: PIPELINE_ID
              value: cctvs
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:9000"
            - name: DATA_HUB_URL
              value: "http://data-hub:8000"
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-gateway
spec:
  type: LoadBalancer
  selector:
    app: web-gateway
  ports:
    - port: 8000
      targetPort: 8000
