apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: smart-building
  labels:
    app: control-plane
    component: routing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: rohe/smart-building-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE
              value: control_plane
            - name: ROHE_SERVICE_NAME
              value: control-plane
            - name: VIDEO_SERVICES
              value: "http://x3d-xs-inference.smart-building.svc.cluster.local:8000,http://x3d-s-inference.smart-building.svc.cluster.local:8000,http://x3d-m-inference.smart-building.svc.cluster.local:8000,http://slowfast-inference.smart-building.svc.cluster.local:8000"
            - name: TIMESERIES_SERVICES
              value: "http://minirocket-svm-inference.smart-building.svc.cluster.local:8000,http://minirocket-ridge-inference.smart-building.svc.cluster.local:8000,http://cnn1d-inference.smart-building.svc.cluster.local:8000,http://lstm-ts-inference.smart-building.svc.cluster.local:8000"
            - name: AGGREGATOR_URL
              value: "http://aggregator.smart-building.svc.cluster.local:8000/aggregate"
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: smart-building
spec:
  type: LoadBalancer
  selector:
    app: control-plane
  ports:
    - port: 8000
      targetPort: 8000
