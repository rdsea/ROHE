apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-hub
  namespace: smart-building
  labels:
    app: data-hub
    component: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-hub
  template:
    metadata:
      labels:
        app: data-hub
    spec:
      containers:
        - name: data-hub
          image: rohe/smart-building-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE
              value: data_hub
            - name: ROHE_SERVICE_NAME
              value: data-hub
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: data-hub
  namespace: smart-building
spec:
  selector:
    app: data-hub
  ports:
    - port: 8000
      targetPort: 8000
