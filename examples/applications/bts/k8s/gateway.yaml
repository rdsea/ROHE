apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: bts
  labels:
    app: gateway
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: rohe/bts-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE
              value: gateway
            - name: ROHE_SERVICE_NAME
              value: gateway
            - name: DATA_INGESTION_URL
              value: "http://data-ingestion.bts.svc.cluster.local:8000"
            - name: INFERENCE_SERVICES
              value: "http://lstm-inference.bts.svc.cluster.local:8000,http://gru-inference.bts.svc.cluster.local:8000,http://transformer-inference.bts.svc.cluster.local:8000,http://statistical-inference.bts.svc.cluster.local:8000"
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: bts
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
