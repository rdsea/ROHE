      context: ..
      dockerfile: smart_building/Dockerfile
      args:
        APP_NAME: smart_building
        SERVICE_NAME: minirocket_ridge_inference
    image: rdsea/smartbuilding-minirocket-ridge-inference:0.0.1
    environment:
