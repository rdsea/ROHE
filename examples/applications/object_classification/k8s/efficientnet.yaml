apiVersion: apps/v1
kind: Deployment
metadata:
  name: efficientnet-inference
  labels:
    app: efficientnet-inference
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: efficientnet-inference
  template:
    metadata:
      labels:
        app: efficientnet-inference
    spec:
      containers:
        - name: efficientnet
          image: rdsea/objclass-efficientnet-inference:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ROHE_SERVICE_NAME
              value: efficientnet
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: efficientnet-inference
spec:
  selector:
    app: efficientnet-inference
  ports:
    - port: 8000
      targetPort: 8000
