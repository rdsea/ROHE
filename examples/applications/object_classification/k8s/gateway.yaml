apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: object-classification
  labels:
    app: gateway
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: rohe/obj-class-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE
              value: gateway
            - name: ROHE_SERVICE_NAME
              value: gateway
            - name: INFERENCE_SERVICES
              value: "resnet50-inference.object-classification.svc.cluster.local:8000,efficientnet-inference.object-classification.svc.cluster.local:8000,mobilenet-inference.object-classification.svc.cluster.local:8000,vit-inference.object-classification.svc.cluster.local:8000"
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: object-classification
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
