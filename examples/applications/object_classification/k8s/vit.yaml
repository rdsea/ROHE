apiVersion: apps/v1
kind: Deployment
metadata:
  name: vit-inference
  labels:
    app: vit-inference
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vit-inference
  template:
    metadata:
      labels:
        app: vit-inference
    spec:
      containers:
        - name: vit
          image: rdsea/objclass-vit-inference:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ROHE_SERVICE_NAME
              value: vit
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vit-inference
spec:
  selector:
    app: vit-inference
  ports:
    - port: 8000
      targetPort: 8000
