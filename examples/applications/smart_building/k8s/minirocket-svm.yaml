apiVersion: apps/v1
kind: Deployment
metadata:
  name: minirocket-svm-inference
  namespace: smart-building
  labels:
    app: minirocket-svm-inference
    component: inference
    modality: timeseries
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minirocket-svm-inference
  template:
    metadata:
      labels:
        app: minirocket-svm-inference
    spec:
      containers:
        - name: minirocket-svm
          image: rohe/smart-building-inference:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_SERVICE
              value: minirocket_svm_inference
            - name: ROHE_SERVICE_NAME
              value: minirocket-svm
            - name: ROHE_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: endpoint
                  optional: true
            - name: ROHE_EXPERIMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: rohe-config
                  key: experiment_id
                  optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: minirocket-svm-inference
  namespace: smart-building
spec:
  selector:
    app: minirocket-svm-inference
  ports:
    - port: 8000
      targetPort: 8000
