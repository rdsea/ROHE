services:
  gateway:
    build:
      context: ./services
      dockerfile: Dockerfile.inference
      args:
        MODEL_SERVICE: gateway
    ports:
      - "8000:8000"
    environment:
      - INFERENCE_SERVICES=http://resnet50:8000,http://efficientnet:8000,http://mobilenet:8000,http://vit:8000
      - ROHE_SERVICE_NAME=gateway
    depends_on:
      - resnet50
      - efficientnet
      - mobilenet
      - vit

  resnet50:
    build:
      context: ./services
      dockerfile: Dockerfile.inference
      args:
        MODEL_SERVICE: resnet50_inference
    environment:
      - ROHE_SERVICE_NAME=resnet50
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  efficientnet:
    build:
      context: ./services
      dockerfile: Dockerfile.inference
      args:
        MODEL_SERVICE: efficientnet_inference
    environment:
      - ROHE_SERVICE_NAME=efficientnet
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  mobilenet:
    build:
      context: ./services
      dockerfile: Dockerfile.inference
      args:
        MODEL_SERVICE: mobilenet_inference
    environment:
      - ROHE_SERVICE_NAME=mobilenet
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  vit:
    build:
      context: ./services
      dockerfile: Dockerfile.inference
      args:
        MODEL_SERVICE: vit_inference
    environment:
      - ROHE_SERVICE_NAME=vit
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  aggregator:
    build:
      context: ./services
      dockerfile: Dockerfile.inference
      args:
        MODEL_SERVICE: aggregator
    environment:
      - ROHE_SERVICE_NAME=aggregator
