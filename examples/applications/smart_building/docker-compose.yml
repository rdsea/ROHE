services:
  control-plane:
    build:
      context: ..
      dockerfile: smart_building/Dockerfile
      args:
        APP_NAME: smart_building
        SERVICE_NAME: control_plane
    image: rdsea/smartbuilding-control-plane:0.0.1
    ports:
      - "8000:8000"
    environment:
      - VIDEO_SERVICES=http://x3d-xs:8000,http://x3d-s:8000,http://x3d-m:8000,http://slowfast:8000
      - TIMESERIES_SERVICES=http://minirocket-svm:8000,http://minirocket-ridge:8000,http://cnn1d:8000,http://lstm-ts:8000
      - AGGREGATOR_URL=http://aggregator:8000/aggregate
      - ROHE_SERVICE_NAME=control-plane
    depends_on:
      - x3d-xs
      - x3d-s
      - x3d-m
      - slowfast
      - minirocket-svm
      - minirocket-ridge
      - cnn1d
      - lstm-ts
      - aggregator

  x3d-xs:
    build:
      context: ..
      dockerfile: smart_building/Dockerfile
      args:
        APP_NAME: smart_building
        SERVICE_NAME: x3d_xs_inference
    image: rdsea/smartbuilding-x3d-xs-inference:0.0.1
    environment:
      - ROHE_SERVICE_NAME=x3d-xs
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  x3d-s:
    build:
      context: ..
      dockerfile: smart_building/Dockerfile
      args:
        APP_NAME: smart_building
        SERVICE_NAME: x3d_s_inference
    image: rdsea/smartbuilding-x3d-s-inference:0.0.1
    environment:
      - ROHE_SERVICE_NAME=x3d-s
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  x3d-m:
    build:
      context: ..
      dockerfile: smart_building/Dockerfile
      args:
        APP_NAME: smart_building
        SERVICE_NAME: x3d_m_inference
    image: rdsea/smartbuilding-x3d-m-inference:0.0.1
    environment:
      - ROHE_SERVICE_NAME=x3d-m
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  slowfast:
    build:
      context: ..
      dockerfile: smart_building/Dockerfile
      args:
        APP_NAME: smart_building
        SERVICE_NAME: slowfast_inference
    image: rdsea/smartbuilding-slowfast-inference:0.0.1
    environment:
      - ROHE_SERVICE_NAME=slowfast
      - ROHE_ENDPOINT=${ROHE_ENDPOINT:-http://host.docker.internal:5010/metrics}

  minirocket-svm:
